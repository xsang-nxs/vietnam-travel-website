<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giỏ Hàng Của Bạn - The3Coachrock</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cart.css">
</head>
<body>

    <div id="header-component"></div>

    <main class="container" style="margin-top: 30px;">
        <div class="cart-title-main">
            <h1>Giỏ hàng của bạn</h1>
            <p id="cart-count-text">Đang tải danh sách dịch vụ...</p>
        </div>

        <div class="cart-grid-layout" id="cart-main-grid" style="display: none;">
            
            <div class="cart-items-section" id="cart-items-list">
                </div>

            <aside class="cart-summary-sidebar">
                <div class="summary-card">
                    <h3>Tóm tắt đơn hàng</h3>
                    <div class="summary-row">
                        <span>Tạm tính:</span>
                        <span id="cart-subtotal">0đ</span>
                    </div>
                    <div class="summary-row">
                        <span>Phí dịch vụ & Thuế:</span>
                        <span style="color: #2e7d32;">Miễn phí</span>
                    </div>
                    <div class="divider-line"></div>
                    <div class="summary-row total-row">
                        <span>Tổng tiền thanh toán:</span>
                        <strong id="cart-total-price">0đ</strong>
                    </div>
                    
                    <button class="btn-checkout-final" id="btn-submit-order">
                        TIẾN HÀNH THANH TOÁN ➔
                    </button>
                    
                    <div class="secure-checkout-notice">
                        🔒 Bảo mật thông tin giao dịch 100%
                    </div>
                </div>
            </aside>
        </div>

        <div class="cart-empty-wrapper" id="cart-empty-box" style="display: none;">
            <div class="empty-icon">🛒</div>
            <h2>Giỏ hàng của bạn đang trống!</h2>
            <p>Hãy chọn cho mình những hành trình du lịch tuyệt vời cùng The3Coachrock nhé.</p>
            <button class="btn-go-home" onclick="window.location.href='main.html'">
                QUAY LẠI TRANG CHỦ TÌM TOUR
            </button>
        </div>
    </main>

    <div id="footer-component"></div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="js/components.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
